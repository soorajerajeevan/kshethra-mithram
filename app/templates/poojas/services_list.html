{% extends "base.html" %}

{% block title %}Pooja Services{% endblock %}

{% block extra_css %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/service-list.css') }}">

{% endblock %}
{% block content %}
<div class="row mb-3">
    <div class="col-md-6">
        <h2><i class="bi bi-calendar-event"></i> Pooja Services</h2>
    </div>
    <div class="col-md-6 text-end">
        <button id="updateChangesBtn" class="btn btn-primary me-2" disabled>
            <i class="bi bi-check-circle"></i> Update Changes
        </button>
        <a href="{{ url_for('poojas.services_add') }}" class="btn btn-primary">
            <i class="bi bi-plus"></i> Add Service (Full Form)
        </a>
    </div>
</div>
<div class="card">
    <div class="card-body">
        <div id="serviceGrid" class="ag-theme-quartz"></div>
    </div>
</div>

{% endblock %}
{% block extra_js %}
<script type="module" src="{{ url_for('static',filename='js/pages/service-list.js') }}">
</script>
{% endblock %}
