{% extends "base.html" %}
{% block title %}New Booking{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header">New Pooja Booking</div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Devotee *</label>
                            <select name="devotee_id" class="form-select" required>
                                <option value="">-- Select Devotee --</option>
                                {% for devotee in devotees %}
                                <option value="{{ devotee.id }}">{{ devotee.devotee_id }} - {{ devotee.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Pooja Service *</label>
                            <select name="service_id" class="form-select" required>
                                <option value="">-- Select Service --</option>
                                {% for service in services %}
                                <option value="{{ service.id }}">{{ service.malayalam_name or service.name }} - {{ service.default_price|currency }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Scheduled Date *</label>
                            <input type="date" name="scheduled_date" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3"></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Custom Price (₹) - Optional</label>
                            <input type="number" name="custom_price" class="form-control" step="1" placeholder="Leave blank for default">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Advance Paid (₹)</label>
                            <input type="number" name="amount_paid" class="form-control" step="1" value="0">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label>Special Instructions</label>
                        <textarea name="special_instructions" class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Booking</button>
                    <a href="{{ url_for('poojas.bookings_list') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    function devoteeLabel(d) { return `${d.devotee_id} - ${d.full_name} (${d.phone || 'No phone'})`; }
    const tomSelectInstances = {};
    function initSearchableSelect(selector, options = {}) {
        const el = document.querySelector(selector);
        if (!el || typeof TomSelect === 'undefined') return null;
        if (el.tomselect) return el.tomselect;
        return new TomSelect(el, {
            create: false,
            maxOptions: 100,
            closeAfterSelect: true,
            dropdownParent: 'body',
            ...options
        });
    }

    function initializeSearchables() {
        initSearchableSelect('#devotee_id', {
            placeholder: 'Type devotee name / ID / phone',
            create: function (input) {
                const clean = (input || '').trim();
                if (!clean) return false;
                return {
                    value: `NEW::${clean}`,
                    text: `${clean} (New devotee)`
                };
            },
            onChange: function (value) {
                toggleNewDevoteePhone(value);
                updateEditDevoteeButton();
            }
        });
    }
    
    function toggleNewDevoteePhone(value) {
        const wrap = document.getElementById('newDevoteePhoneWrap');
        const phone = document.getElementById('new_devotee_phone');
        // The new-devotee inline inputs may not be rendered on this page.
        // Bail out gracefully so the rest of the onChange chain (refreshing
        // the pooja family-member dropdowns) still runs.
        if (!wrap || !phone) return;
        const isNew = String(value || '').startsWith('NEW::');
        if (isNew) {
            wrap.classList.remove('d-none');
            phone.required = true;
        } else {
            wrap.classList.add('d-none');
            phone.required = false;
            phone.value = '';
        }
    }

</script>
{% endblock %}
