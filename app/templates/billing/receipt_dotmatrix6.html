<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt - Dot Matrix 6in - {{ temple_name }}</title>
    <style>
        @page { size: 6in auto; margin: 0; }
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            color: #000;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            line-height: 1;
            print-color-adjust: exact;
            -webkit-print-color-adjust: exact;
        }
        .receipt-canvas {
            position: relative;
            width: {{ dotmatrix_layout.metrics.canvasWidth if dotmatrix_layout else 576 }}px;
            height: {{ dotmatrix_layout.metrics.canvasHeight if dotmatrix_layout else 1000 }}px;
            overflow: hidden;
        }
        .word-layer {
            position: absolute;
            white-space: pre;
        }
        .divider-layer {
            position: absolute;
            border-top: 1px solid #000;
            height: 0;
        }
        .divider-layer[data-char="="] {
            border-top-width: 2px;
        }
    </style>
</head>
<body>
    <div class="receipt-canvas">
        {% if dotmatrix_layout %}
            {% for word in dotmatrix_layout.words %}
                {% if word.enabled %}
                <div class="word-layer" style="left: {{ word.x }}px; top: {{ word.y }}px;">{{ word.text }}</div>
                {% endif %}
            {% endfor %}
            {% for divider in dotmatrix_layout.dividers %}
                {% if divider.enabled %}
                <div class="divider-layer" data-char="{{ divider.char }}" style="left: {{ divider.x }}px; top: {{ divider.y }}px; width: {{ divider.width }}px;"></div>
                {% endif %}
            {% endfor %}
        {% endif %}
    </div>
</body>
</html>
