{% extends "base.html" %}
{% block title %}Edit Devotee{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">Edit Devotee - {{ devotee.devotee_id }}</div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Full Name *</label>
                            <input type="text" name="full_name" class="form-control" value="{{ devotee.full_name }}"
                                required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Phone *</label>
                            <input type="text" name="phone" class="form-control" value="{{ devotee.phone }}" required>
                        </div>
                    </div>
                    <!-- <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" value="{{ devotee.email or '' }}">
                        </div>
                    </div> -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>House Name</label>
                            <input type="text" name="gotra" class="form-control" value="{{ devotee.gotra or '' }}">
                        </div>
                        <div class="mb-3">
                            <label>Address</label>
                            <textarea name="address" class="form-control"
                                rows="2">{{ devotee.address or '' }}</textarea>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label>Family Members</label>
                        <div id="familyMembersContainer"></div>
                        <button type="button" id="addFamilyMemberBtn" class="btn btn-outline-secondary btn-sm mt-2">
                            <i class="bi bi-plus-circle"></i> Add Family Member
                        </button>
                    </div>
                    <button type="submit" class="btn btn-primary">Update</button>
                    <a href="{{ url_for('devotees.view', id=devotee.id) }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    const existingFamilyMembers = {{ family_members | tojson }};
    var nakshathrams = [];

    function initSearchableSelect(target, options = {}) {
        if (!target) return null;
        if (typeof target === 'string' && !target.trim()) return null;
        const el = typeof target === 'string' ? document.querySelector(target) : target;
        if (!el || el.nodeType !== 1) return null;
        if (!(el instanceof HTMLInputElement || el instanceof HTMLSelectElement)) return null;
        if (typeof TomSelect === 'undefined') return null;
        if (el.tomselect) return el.tomselect;

        return new TomSelect(el, {
            maxOptions: 50,
            maxItems: 1,
            closeAfterSelect: true,
            ...options
        });
    }

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function loadDropDownForNakshathra() {
        document.querySelectorAll('input.devoteeNakshathram, select.devoteeNakshathram').forEach((el) => {
            if (!(el instanceof HTMLInputElement || el instanceof HTMLSelectElement)) return;
            initSearchableSelect(el, {
                valueField: 'malayalam_name',
                labelField: 'display_name',
                searchField: ['english_name', 'id', 'malayalam_name'],
                options: nakshathrams,
                placeholder: 'Nakshathram',
                create: false
            });
        });
    }

    function addFamilyMemberRow(name = '', nakshathram = '') {
        const container = document.getElementById('familyMembersContainer');
        const row = document.createElement('div');
        row.className = 'row g-2 align-items-end mb-2 family-member-row';
        row.innerHTML = `
            <div class="col-md-5">
                <label class="form-label">Name</label>
                <input type="text" name="family_member_name[]" class="form-control" value="${escapeHtml(name)}">
            </div>
            <div class="col-md-5">
                <label class="form-label">Nakshathram</label>
                <input type="text" name="family_member_nakshathram[]" class="form-control devoteeNakshathram" value="${escapeHtml(nakshathram)}">
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-outline-danger btn-sm w-100 remove-family-member">Remove</button>
            </div>
        `;
        container.appendChild(row);
        loadDropDownForNakshathra();
    }

    document.addEventListener('DOMContentLoaded', function () {
        fetch('/devotees/nakshatra')
            .then(response => response.json())
            .then(data => {
                nakshathrams = data.map(n => ({
                    id: n.malayalam_name,
                    english_name: n.english_name,
                    malayalam_name: n.malayalam_name,
                    display_name: `${n.id} - ${n.malayalam_name}`
                }));

                loadDropDownForNakshathra();

                if (existingFamilyMembers.length > 0) {
                    existingFamilyMembers.forEach(member => {
                        addFamilyMemberRow(member.name, member.nakshathram);
                    });
                } else {
                    addFamilyMemberRow();
                }
            })
            .catch(error => console.error('Error fetching nakshatras:', error));

        const container = document.getElementById('familyMembersContainer');
        const addButton = document.getElementById('addFamilyMemberBtn');

        addButton.addEventListener('click', function () {
            addFamilyMemberRow();
        });

        container.addEventListener('click', function (event) {
            if (!event.target.classList.contains('remove-family-member')) return;
            const row = event.target.closest('.family-member-row');
            if (row) row.remove();
        });
    });
</script>
{% endblock %}
